data:
  data_source: simulation
  distribution: inv_gauss
  random_seed: 11
  n_samples: 100000
  n_features: 5
  test_size: 0.2
  normalize_features: true
  parameter_function: |
    def parameter(X):
        # log(mu) = a1*x1*x2*x3 + a2*|x4|
        # a1=0.1, a2=0.4
        z0 = (0.1 * X[:,0] * X[:,1] * X[:,2]
              + 0.4 * np.abs(X[:,3]))
        # log(lambda) = b0 + b1*1{x1>0} + b2*x2*1{x5>0}
        # b0=1.0, b1=0.5, b2=0.4
        z1 = (1.0
              + 0.5 * (X[:,0] > 0).astype(float)
              + 0.4 * X[:,1] * (X[:,4] > 0).astype(float))
        return np.stack([z0, z1])

output:
  output_dir: data/results

models:
  - model_class: intercept
  - model_class: cgbm
    n_estimators: [500, 500]
    max_depth: 4
    learning_rate: [0.1, 0.1]

bootstrap:
  n_bootstraps: 1
  parallel: true
  n_jobs: -1

tuning:
  perform_tuning: true
  n_folds: 4
