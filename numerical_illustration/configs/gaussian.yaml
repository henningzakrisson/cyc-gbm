data:
  data_source: simulation
  distribution: normal
  random_seed: 11
  n_samples: 100000
  n_features: 5
  test_size: 0.2
  normalize_features: true
  parameter_function: |
    def parameter(X):
        # mu = a1*x1 + a2*x2^2 + a3*|x3|*sin(a4*x2) + a5*x4*x5^2
        # a1=1.5, a2=0.8, a3=0.5, a4=1.5, a5=0.2
        z0 = (1.5 * X[:,0]
              + 0.8 * X[:,1]**2
              + 0.5 * np.abs(X[:,2]) * np.sin(1.5 * X[:,1])
              + 0.2 * X[:,3] * X[:,4]**2)
        # log(sigma) = b0 + b1*x2 + b2*|x1|*sin(b3*x2) + b4*1{x2>0}
        # b0=-0.5, b1=0.4, b2=0.3, b3=1.0, b4=0.5
        z1 = (-0.5
              + 0.4 * X[:,1]
              + 0.3 * np.abs(X[:,0]) * np.sin(1.0 * X[:,1])
              + 0.5 * (X[:,1] > 0).astype(float))
        return np.stack([z0, z1])

output:
  output_dir: data/results

models:
  - model_class: intercept
  - model_class: cglm
    max_iter: 2000
    tolerance: 1e-5
    step_size: 0.1
  - model_class: gbm
    n_estimators: 600
    max_depth: 4
    learning_rate: 0.05
  - model_class: ngboost
    n_estimators: 2000
    max_depth: 4
    learning_rate: 0.01
  - model_class: cgbm
    n_estimators: [500, 500]
    max_depth: 4
    learning_rate: [0.05, 0.01]

bootstrap:
  n_bootstraps: 3
  parallel: true
  n_jobs: -1

tuning:
  perform_tuning: true
  n_folds: 2
