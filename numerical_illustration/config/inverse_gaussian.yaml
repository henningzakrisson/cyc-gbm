# High level configuration
output_dir: data/results
data_source: simulation
random_seed: 11
n_bootstraps: 1
parallel: true
n_jobs: -1

# Simulation setup
n_samples: 100000
n_features: 5
distribution: inv_gauss
parameter_function: |
  def parameter(X):
      # log(mu) = a1*x1*x2*x3 + a2*|x4|
      # a1=0.1, a2=0.4
      z0 = (0.1 * X[:,0] * X[:,1] * X[:,2]
            + 0.4 * np.abs(X[:,3]))
      # log(lambda) = b0 + b1*1{x1>0} + b2*x2*1{x5>0}
      # b0=1.0, b1=0.5, b2=0.4
      z1 = (1.0
            + 0.5 * (X[:,0] > 0).astype(float)
            + 0.4 * X[:,1] * (X[:,4] > 0).astype(float))
      return np.stack([z0, z1])

# Preprocessing setup
test_size: 0.2
normalize: True

# Model setup
models:
  - intercept
  # - cglm
  # - gbm
  # - ngboost
  - cgbm

# Model hyperparameters
model_hyperparameters:
  cglm:
    max_iter: 2000
    tolerance: 1e-5
    step_size: 0.1
  gbm:
    n_estimators: 600
    max_depth: 4
    learning_rate: 0.05
  ngboost:
    n_estimators: 2000
    learning_rate: 0.01
    early_stopping_rounds: 50
  cgbm:
    n_estimators:
     - 500
     - 500
    max_depth: 4
    learning_rate:
      - 0.1
      - 0.1

# Model tuning
tuning: true
n_splits: 4
